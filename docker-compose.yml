services:
  signal-backend:
    image: bbernhard/signal-cli-rest-api:latest
    container_name: signal-backend
    restart: unless-stopped
    environment:
      # json-rpc mode runs signal-cli as a persistent daemon and exposes the
      # WebSocket receive stream the MCP server's receiver subscribes to.
      - MODE=json-rpc
    volumes:
      # Holds the linking/session keys — MUST be persistent.
      - /mnt/apps/signal-mcp/signal-cli:/home/.local/share/signal-cli
    expose:
      - "8080"
    networks:
      - signal-internal

  signal-mcp:
    image: ghcr.io/mbay-odw/signal-mcp-server:latest
    container_name: signal-mcp
    restart: unless-stopped
    depends_on:
      - signal-backend
    environment:
      - LOG_LEVEL=INFO
      - MCP_TRANSPORT=sse
      - PORT=8000
      - SIGNAL_NUMBER=${SIGNAL_NUMBER}
      - SIGNAL_BACKEND_URL=http://signal-backend:8080
      - SIGNAL_DB_PATH=/data/signal.db
      - SIGNAL_ATTACHMENTS_DIR=/data/attachments
      - MCP_API_KEY=${MCP_API_KEY}
      - OIDC_CLIENT_ID=signal-mcp
      - OIDC_CLIENT_SECRET=${OIDC_CLIENT_SECRET}
      # Introspection points DIRECTLY at Authelia (no per-host OIDC routing
      # needed). The app serves /.well-known itself. Same model as whatsapp-mcp.
      - OAUTH_ISSUER=https://authelia.${DOMAIN}
      - OIDC_INTROSPECTION_URL=https://authelia.${DOMAIN}/api/oidc/introspection
      - MCP_SERVER_URL=https://signal-mcp.${DOMAIN}
    volumes:
      - /mnt/apps/signal-mcp/data:/data
    expose:
      - "8000"
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik"
      # Single Host router — all paths (/mcp, /sse, /messages, /.well-known) go
      # to the app. No PathPrefix, no separate OIDC routers.
      - "traefik.http.routers.signal-mcp.rule=Host(`signal-mcp.${DOMAIN}`)"
      - "traefik.http.routers.signal-mcp.entrypoints=websecure"
      - "traefik.http.routers.signal-mcp.service=signal-mcp-svc"
      - "traefik.http.routers.signal-mcp.tls=true"
      - "traefik.http.routers.signal-mcp.tls.certresolver=mydnschallenge"
      - "traefik.http.routers.signal-mcp.middlewares=middlewares-rate-limit@file,middlewares-secure-headers@file"
      - "traefik.http.services.signal-mcp-svc.loadbalancer.server.port=8000"
    networks:
      - signal-internal
      - traefik

networks:
  signal-internal:
  traefik:
    external: true
