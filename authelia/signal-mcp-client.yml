# Add this block to your Authelia identity_providers.oidc.clients list.
# Generate the secret hash with:
#   authelia crypto hash generate pbkdf2 --variant sha512 --password '<plaintext>'
# Put the PLAINTEXT into the stack env OIDC_CLIENT_SECRET, the HASH here.
# After editing configuration.yml: `docker restart authelia`
# (config must stay 644 root:root; Authelia runs as PUID=0).

- client_id: signal-mcp
  client_name: Claude Signal MCP
  authorization_policy: one_factor
  client_secret: 'PBKDF2_HASH_HIER_EINTRAGEN'
  redirect_uris:
    - https://claude.ai/api/mcp/auth_callback
  scopes: [openid, profile, email, offline_access, address, phone, groups]
  grant_types: [authorization_code, refresh_token]
  response_types: [code]
  token_endpoint_auth_method: client_secret_post
  introspection_endpoint_auth_method: client_secret_basic   # our server introspects with basic
  consent_mode: pre-configured                              # skip consent on reconnect
  pre_configured_consent_duration: 1y
