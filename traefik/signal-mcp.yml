# Traefik dynamic (file-provider) rule for signal-mcp.
# IMPORTANT: In this homelab Traefik routes via FILE-PROVIDER rules, NOT docker
# labels — the docker provider does not pick up newly created containers, so the
# compose `traefik.*` labels are inert here. Drop this file into Traefik's rules
# dir (e.g. /mnt/apps/traefik/data/traefik2/rules/signal-mcp.yml); the file
# provider hot-reloads it, no Traefik restart needed.
#
# - The catch-all Host router sends /mcp, /sse, /messages to the signal-mcp
#   container (service `signal-mcp` -> http://signal-mcp:8000).
# - The path-specific routers proxy Authelia's OIDC + discovery endpoints under
#   this host (service `authelia-oidc`, shared, defined in hero-mcp.yml), each
#   carrying the `set-authelia-host` middleware (else Authelia 500s on discovery).
# Mirrors whatsapp-mcp.yml / hero-mcp.yml. Replace bay-ram.de with your domain.

http:
  middlewares:
    rewrite-authorize-signal:
      replacePath:
        path: "/api/oidc/authorization"

  routers:
    signal-mcp:
      rule: "Host(`signal-mcp.bay-ram.de`)"
      entrypoints: [websecure]
      service: signal-mcp
      middlewares: [middlewares-rate-limit, middlewares-secure-headers]
      tls:
        certResolver: mydnschallenge

    signal-mcp-authorize:
      rule: "Host(`signal-mcp.bay-ram.de`) && PathPrefix(`/authorize`)"
      entrypoints: [websecure]
      service: authelia-oidc
      middlewares: [rewrite-authorize-signal, set-authelia-host]
      tls:
        certResolver: mydnschallenge

    signal-mcp-root:
      rule: "Host(`signal-mcp.bay-ram.de`) && Path(`/`)"
      entrypoints: [websecure]
      service: authelia-oidc
      middlewares: [set-authelia-host]
      tls:
        certResolver: mydnschallenge

    signal-mcp-oidc:
      rule: "Host(`signal-mcp.bay-ram.de`) && PathPrefix(`/api/oidc`)"
      entrypoints: [websecure]
      service: authelia-oidc
      middlewares: [set-authelia-host]
      tls:
        certResolver: mydnschallenge

    signal-mcp-api:
      rule: "Host(`signal-mcp.bay-ram.de`) && PathPrefix(`/api`)"
      entrypoints: [websecure]
      service: authelia-oidc
      middlewares: [set-authelia-host]
      tls:
        certResolver: mydnschallenge

    signal-mcp-consent:
      rule: "Host(`signal-mcp.bay-ram.de`) && PathPrefix(`/consent`)"
      entrypoints: [websecure]
      service: authelia-oidc
      middlewares: [set-authelia-host]
      tls:
        certResolver: mydnschallenge

    signal-mcp-static:
      rule: "Host(`signal-mcp.bay-ram.de`) && PathPrefix(`/static`)"
      entrypoints: [websecure]
      service: authelia-oidc
      middlewares: [set-authelia-host]
      tls:
        certResolver: mydnschallenge

    signal-mcp-wellknown:
      rule: "Host(`signal-mcp.bay-ram.de`) && PathPrefix(`/.well-known`)"
      entrypoints: [websecure]
      service: authelia-oidc
      middlewares: [set-authelia-host]
      tls:
        certResolver: mydnschallenge

  services:
    signal-mcp:
      loadBalancer:
        servers:
          - url: "http://signal-mcp:8000"
